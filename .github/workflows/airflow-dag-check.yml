name: Airflow DAG Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dag-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Apache Airflow
        run: |
          # Install Airflow (and the postgres + spark providers the
          # iceberg_maintenance DAG imports) with the official constraints file
          # so transitive deps (e.g. google-re2) resolve to published wheels
          # instead of building from source, which requires bazel and fails.
          AIRFLOW_VERSION=2.8.1
          PYTHON_VERSION="$(python -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINT_URL}"
          # Install the providers the iceberg_maintenance DAG imports in a
          # separate, unconstrained step so the resolver can pick versions
          # compatible with the pinned Airflow without over-constraining.
          pip install apache-airflow-providers-postgres apache-airflow-providers-apache-spark
          python -c "import airflow.providers.postgres, airflow.providers.spark; print('providers OK')"
      - name: Install project requirements
        run: |
          pip install -r airflow/requirements.txt || true
          pip install -r requirements.txt || true
          # Ensure the deps the news_pipeline DAG imports at parse time are present.
          pip install pytest pandas pyyaml mlflow
      - name: Initialize Airflow metadata DB
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/.airflow_home
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
        run: |
          # The DAG-structure tests resolve DAGs via DagBag, which queries the
          # metadata DB; create a local SQLite one.
          airflow db migrate
      - name: Run DAG import/unit tests
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/.airflow_home
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
        run: pytest -q tests/dags
